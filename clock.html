<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF_8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/favicon.ico">
    <title>께이뜰</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        .container {
            width:900px;
            max-width:90%;
            margin: 20px auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 40px 100px;
        }

        .logo {
            font-size: 40px;
            font-weight: bold;
        }

        .logo a {
            color: #333;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #555;
        }

        .hero {
            margin-top: 0;
        }

        .hero h1 {
            font-size: 42px;
        }

        .hero p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="/">께이뜰</a>
        </div>
        <nav>
            <a href="/clock">통방 10000시간</a>
        </nav>
    </header>

    <div class="container">
        <div style="display: flex; height: 100px;">
            <div style="flex: 1;">
                <h1>
                    <div style="text-align: center;">
                        <span id="day"></span> 일
                        <span id="hr"></span> 시간
                        <span id="min"></span> 분
                        <span id="sec"></span> 초 경과
                    </div>
                    <div style="text-align: center;">
                        <span id="day2"></span> 일
                        <span id="hr2"></span> 시간
                        <span id="min2"></span> 분
                        <span id="sec2"></span> 초 남음
                    </div>
                    <div style="text-align: center;">
                        <progress id="progress" value="0" min="0" max="100"></progress>
                    </div>
                </h1>
            </div>
        </div>
    </div>
</body>
<script>
    const target = new Date("{{ target }}")

    function updateclock() {
        const enddate = new Date(target.getTime() + 1000 * 3600 * 10000)
        const today = new Date();
        const timediff = today - target;
        const enddiff = enddate - today;

        const day = Math.floor(timediff / (1000 * 60 * 60 * 24))
        const hr = Math.floor(timediff / (1000 * 60 * 60)) % 24
        const min = Math.floor(timediff / (1000 * 60)) % 60
        const sec = Math.floor(timediff / 1000) % 60

        const day2 = Math.floor(enddiff / (1000 * 60 * 60 * 24))
        const hr2 = Math.floor(enddiff / (1000 * 60 * 60)) % 24
        const min2 = Math.floor(enddiff / (1000 * 60)) % 60
        const sec2 = Math.floor(enddiff / 1000) % 60

        const prog = Math.floor(timediff / (1000 * 60 * 60)) / 10000 * 100

        document.getElementById("day").textContent = day
        document.getElementById("day2").textContent = day2
        document.getElementById("hr").textContent = hr
        document.getElementById("hr2").textContent = hr2
        document.getElementById("min").textContent = min
        document.getElementById("min2").textContent = min2
        document.getElementById("sec").textContent = sec
        document.getElementById("sec2").textContent = sec2

        document.getElementById("progress").value = prog
    }

    updateclock();
                            
    setInterval(updateclock, 1000);
</script>

</html>
