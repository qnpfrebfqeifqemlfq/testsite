<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF_8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/favicon.ico">
    <title>께이뜰</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        .container {
            width:900px;
            max-width:90%;
            margin: 20px auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 40px 100px;
        }

        .logo {
            font-size: 40px;
            font-weight: bold;
        }

        .logo a {
            color: #333;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #555;
        }

        .hero {
            margin-top: 0;
        }

        .hero h1 {
            font-size: 42px;
        }

        .hero p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <a href="/">께이뜰</a>
        </div>
        <nav>
            <a href="/clock">통방 10000시간</a>
        </nav>
    </header>

    <div class="container">
        <section class="hero">
            <img src="../static/miyako.jpg">
        </section>
    </div>
</body>

</html>
