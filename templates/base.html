<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF_8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../static/favicon.ico">
    <title>께이뜰</title>
    <style>
        body {
            margin: 0;
            text-align: center;
            font-family: sans-serif;
            background: #f4f6f8;
            color: #333;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            width:900px;
            max-width:90%;
            margin: 20px auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 40px 100px;
        }

        .logo {
            font-size: 40px;
            font-weight: bold;
        }

        .logo a {
            color: #333;
            text-decoration: none;
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            text-decoration: none;
            color: #555;
        }

        .hero {
            margin-top: 0;
        }

        .logo, .logo:visited {
            color: inherit;
            text-decoration: none;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .rainbow {
            font-weight: bold;
            background: linear-gradient(
                90deg,
                red,
                orange,
                yellow,
                green,
                blue,
                violet,
                red
            );

            background-size: 300%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;

            animation: move 10s linear infinite;
        }

        @keyframes move{
            0%{
                background-position: 0%;
            }
            100%{
                background-position: 300%;
            }
        }

        #chat-box{
            width:700px;
            height:500px;
            text-align: left;
            overflow-y:auto;
            border:1px solid gray;
            padding:10px;
        }

        .message{
            display:flex;
            align-items: flex-start;
            gap:10px;
            flex-wrap: nowrap;
            margin-bottom:5px;
        }

        .time{
            white-space: nowrap;
            flex-shrink: 0;
            color:gray;
        }

        .username{
            flex-shrink:0;
            font-weight:bold;
            min-width:120px;
        }

        .content{
            flex:1;
            word-break:break-word;
        }
    </style>
</head>

<body>
    <header>
        {% if notice %}
            <div class="notice">📢 {{ notice.text }}</div>
        {% endif %}
        <a href="/" class="logo">께이뜰</a>
        <nav>
            <a href="/clock">통방 10000시간</a>
            <a href="/stock">주식 & 실시간 채팅</a>
            {% if current_user.is_authenticated %}
                <a href="/logout">로그아웃</a>
                <span class="{% if current_user.is_admin %}rainbow{% endif %}">
                    {{ current_user.username }}님 환영합니다!
                </span>
                {% if current_user.is_admin %}
                    <a href="/admin">For Admin</a>
                {% endif %}
            {% else %}
                <a href="/login">로그인</a>
                <a href="/register">회원가입</a>
            {% endif %}
        </nav>
    </header>
</body>

{% block content %}
{% endblock %}

</body>
</html>
